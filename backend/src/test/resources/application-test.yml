# 集成测试：MySQL 由 Testcontainers 提供；Redis 在测试中排除，避免强依赖本机 Redis
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: WARN
    org.flywaydb: INFO
