# 生产环境：敏感项必须由环境变量注入，勿提交密钥
spring:
  datasource:
    url: ${SKILLSOPS_DB_URL}
    username: ${SKILLSOPS_DB_USERNAME}
    password: ${SKILLSOPS_DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      leak-detection-threshold: 60000
  data:
    redis:
      host: ${SKILLSOPS_REDIS_HOST}
      port: ${SKILLSOPS_REDIS_PORT:6379}
      password: ${SKILLSOPS_REDIS_PASSWORD:}
  flyway:
    enabled: ${SKILLSOPS_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    # 生产由发布流水线/DBA 控制迁移窗口；禁止 clean，仅 migrate
    clean-disabled: true

logging:
  level:
    root: WARN
    com.skillsops: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN

server:
  servlet:
    session:
      cookie:
        secure: true
        same-site: strict
